<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russian Flashcards Pro</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #e74c3c; 
            --success: #27ae60; 
            --bg: #ecf0f1; 
            --dark-gray: #7f8c8d;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
        }
        
        /* Top Dashboard Layout */
        .dashboard {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 600;
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .score-box { color: var(--success); }

        /* Configuration Menu Controls */
        .config-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 500px;
        }
        select, input[type="text"] {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 0.95rem;
            outline: none;
        }
        select { background-color: white; cursor: pointer; }
        .search-box { flex-grow: 1; max-width: 300px; }

        /* Card Animation Setup */
        .card-container { perspective: 1000px; width: 380px; height: 280px; cursor: pointer; }
        .card { position: relative; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; box-sizing: border-box; background: white; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border: 1px solid #dcdde1; }
        .card-back { transform: rotateY(180deg); background: #f9f9f9; }
        
        /* Typography Elements */
        .russian-text { font-size: 2.8rem; font-weight: bold; color: var(--primary); margin: 0; text-align: center; word-break: break-word; }
        .accented { color: var(--accent); }
        .pronunciation-guide { font-size: 1.1rem; color: #e67e22; margin-top: 8px; font-style: italic; font-weight: 500; }
        .english-text { font-size: 1.4rem; color: var(--dark-gray); text-align: center; margin-top: 10px; max-height: 80px; overflow-y: auto; }

        /* Quiz Component Area */
        .quiz-container {
            margin-top: 20px;
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 380px;
        }
        .quiz-input {
            flex-grow: 1;
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1rem;
            text-align: center;
            transition: all 0.3s;
        }
        .quiz-input.correct { border-color: var(--success); background-color: #e8f8f5; }
        .quiz-input.wrong { border-color: var(--accent); background-color: #fceae9; }

        /* General Button System */
        .controls { display: flex; gap: 12px; margin-top: 25px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 24px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-size: 1rem; transition: 0.2s; font-weight: 600; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-audio { background: var(--success); display: block; margin-top: 15px; padding: 8px 18px; font-size: 0.9rem; }
        
        #error-msg { color: var(--accent); font-weight: bold; margin-top: 30px; text-align: center; display: none; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="dashboard">
        <div>Card <span id="current-idx">0</span> of <span id="total-cards">0</span></div>
        <div class="score-box">Score: <span id="score-val">0</span> XP</div>
    </div>

    <div class="config-panel">
        <select id="level-select" onchange="switchDeckFromSelect()">
            <option value="a1">Level A1</option>
            <option value="a2">Level A2</option>
            <option value="b1">Level B1</option>
            <option value="b2">Level B2</option>
            <option value="c1">Level C1</option>
            <option value="c2">Level C2</option>
        </select>
        <input type="text" id="search-bar" class="search-box" placeholder="🔍 Dictionary search (All Decks)..." oninput="searchGlobalDictionary()">
    </div>

    <div id="error-msg"></div>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card-inner">
            <div class="card-face">
                <div class="russian-text" id="front-word">...</div>
                <div class="pronunciation-guide" id="front-pronunciation">[...]</div>
                <div style="margin-top: 20px; color: #bdc3c7; font-size: 0.9rem;">Click or Spacebar to reveal</div>
            </div>
            <div class="card-face card-back">
                <div class="russian-text accented" id="back-word">...</div>
                <div class="english-text" id="translation">...</div>
                <button class="btn-audio" onclick="playAudio(event)">🔊 Listen</button>
            </div>
        </div>
    </div>

    <div class="quiz-container">
        <input type="text" id="quiz-guess" class="quiz-input" placeholder="Type English translation..." autocomplete="off" onkeydown="checkQuizSubmit(event)">
        <button onclick="evaluateGuess()" style="background: #34495e;">Verify</button>
    </div>

    <div class="controls">
        <button onclick="prevCard()">← Back</button>
        <button onclick="nextCard()">Next →</button>
        <button onclick="shuffleCards()" style="background: #9b59b6;">Shuffle Deck</button>
    </div>

    <script>
        // Global master registry holding data across all 6 levels
        let allDecks = { a1: [], a2: [], b1: [], b2: [], c1: [], c2: [] };
        let words = []; // Active visible flashcard deck array subset
        let index = 0;
        let score = 0;
        let activeQuizWordId = null; 
        let isTransitioning = false; // Prevents input double-submission issues

        // Comprehensive Phonetic Transliteration Rules Mapping
        const cyrillicPhoneticMap = {
            'а': 'a', 'б': 'b', 'в': 'v', 'г': 'g', 'д': 'd', 'е': 'ye', 'ё': 'yo', 'ж': 'zh', 
            'з': 'z', 'и': 'ee', 'й': 'y', 'к': 'k', 'л': 'l', 'м': 'm', 'н': 'n', 'о': 'o', 
            'п': 'p', 'р': 'r', 'с': 's', 'т': 't', 'у': 'oo', 'ф': 'f', 'х': 'kh', 'ц': 'ts', 
            'ч': 'ch', 'ш': 'sh', 'щ': 'shch', 'ы': 'y', 'э': 'e', 'ю': 'yu', 'я': 'ya',
            'ь': 'i', 'ъ': '', 'и́': 'eé', 'а́': 'á', 'е́': 'yé', 'о́': 'ó', 'у́': 'oó', 'ы́': 'ý', 'я́': 'yá', 'ю́': 'yoú', 'э́': 'é'
        };

        // Generates clean readable text pronunciations automatically
        function generatePronunciationGuide(word) {
            let lowerWord = word.toLowerCase();
            let pronunciation = "";
            
            for (let i = 0; i < lowerWord.length; i++) {
                let char = lowerWord[i];
                // Handle accent markings grouped with vowel characters gracefully
                if (i + 1 < lowerWord.length && lowerWord[i + 1] === '\u0301') {
                    char += '\u0301';
                    i++; 
                }
                pronunciation += (cyrillicPhoneticMap[char] !== undefined) ? cyrillicPhoneticMap[char] : char;
            }
            // Add slight phonetic syllables dash structure breakdown logic
            return `[${pronunciation.replace(/([^aeiouyeeoo]{2,})/g, '$1-')}]`.replace(/-+/g, '-').replace(/-]/g, ']');
        }

        // Pre-fetch all files immediately on startup to feed dictionary database engine
        async function initGlobalApp() {
            const levels = ['a1', 'a2', 'b1', 'b2', 'c1', 'c2'];
            const errDiv = document.getElementById('error-msg');
            let loadedCount = 0;

            for (const lvl of levels) {
                try {
                    const response = await fetch(`${lvl}_combined.json`);
                    if (response.ok) {
                        const data = await response.json();
                        allDecks[lvl] = data.result.entries;
                        loadedCount++;
                    }
                } catch (e) {
                    console.warn(`Could not preload ${lvl}_combined.json file asset registry target.`);
                }
            }

            if (loadedCount === 0) {
                errDiv.style.display = 'block';
                errDiv.innerHTML = `Error: No language files could be found.<br><small>Make sure you run a local server environment (Live Server in VS Code).</small>`;
            } else {
                // Initialize display configuration using default first selection
                switchDeck('a1');
            }
        }

        function switchDeckFromSelect() {
            const targetLvl = document.getElementById('level-select').value;
            switchDeck(targetLvl);
        }

        function switchDeck(levelKey) {
            words = allDecks[levelKey] || [];
            index = 0;
            document.getElementById('level-select').value = levelKey;
            document.getElementById('total-cards').innerText = words.length;
            render();
        }

        function render() {
            if (words.length === 0) { clearRender(); return; }
            const current = words[index];
            
            document.getElementById('current-idx').innerText = index + 1;
            document.getElementById('front-word').innerText = current.bare;
            
            // Inject dynamically structured visual pronunciation key layout parameters
            document.getElementById('front-pronunciation').innerText = generatePronunciationGuide(current.accented);
            
            document.getElementById('back-word').innerText = current.accented;
            document.getElementById('translation').innerText = current.majorTranslations.join(', ');
            
            document.getElementById('card-inner').classList.remove('is-flipped');
            const guessInput = document.getElementById('quiz-guess');
            guessInput.value = '';
            guessInput.className = 'quiz-input';
            isTransitioning = false;
        }

        function clearRender() {
            document.getElementById('current-idx').innerText = '0';
            document.getElementById('total-cards').innerText = '0';
            document.getElementById('front-word').innerText = '...';
            document.getElementById('front-pronunciation').innerText = '[...]';
            document.getElementById('back-word').innerText = '...';
            document.getElementById('translation').innerText = '...';
        }

        function flipCard() {
            if(words.length > 0 && !isTransitioning) {
                document.getElementById('card-inner').classList.toggle('is-flipped');
            }
        }

        function nextCard() {
            if (index < words.length - 1) {
                index++;
                render();
            }
        }

        function prevCard() {
            if (index > 0) {
                index--;
                render();
            }
        }

        function shuffleCards() {
            if (words.length === 0) return;
            words.sort(() => Math.random() - 0.5);
            index = 0;
            render();
        }

        function playAudio(event) {
            if (event) event.stopPropagation(); 
            if (words.length === 0) return;

            const baseWord = words[index].bare;
            const utterance = new SpeechSynthesisUtterance(baseWord);
            utterance.lang = 'ru-RU'; 
            
            const voices = window.speechSynthesis.getVoices();
            const ruVoice = voices.find(voice => voice.lang.startsWith('ru'));
            if (ruVoice) utterance.voice = ruVoice;

            window.speechSynthesis.speak(utterance);
        }

        // Global Dictionary Deep Search Algorithm Matrix
        function searchGlobalDictionary() {
            const query = document.getElementById('search-bar').value.toLowerCase().trim();
            if (!query) return;

            const levels = ['a1', 'a2', 'b1', 'b2', 'c1', 'c2'];
            
            // Scan across every available dictionary array entry
            for (const lvl of levels) {
                const searchDeck = allDecks[lvl];
                const foundIndex = searchDeck.findIndex(item => 
                    item.bare.toLowerCase().includes(query) || 
                    item.majorTranslations.some(t => t.toLowerCase().includes(query))
                );

                if (foundIndex !== -1) {
                    // Instantly sync layout configuration deck to the matching level file discovery target
                    words = allDecks[lvl];
                    index = foundIndex;
                    document.getElementById('total-cards').innerText = words.length;
                    document.getElementById('level-select').value = lvl;
                    render();
                    break; // Exit search scanning early upon match realization
                }
            }
        }

        function checkQuizSubmit(event) {
            if (event.key === 'Enter') {
                evaluateGuess();
            }
        }

        // Gamified Quiz Mode Engine Verification with Auto-Advance Timer Integration
        function evaluateGuess() {
            if (words.length === 0 || isTransitioning) return;
            
            const guessInput = document.getElementById('quiz-guess');
            const currentCard = words[index];
            const userSanitizedGuess = guessInput.value.toLowerCase().trim();
            
            if(!userSanitizedGuess) return;

            const validTranslations = currentCard.majorTranslations.map(t => t.toLowerCase().trim());
            const isCorrect = validTranslations.some(translation => {
                return userSanitizedGuess === translation || 
                       translation.includes(userSanitizedGuess) && userSanitizedGuess.length > 2;
            });

            if (isCorrect) {
                isTransitioning = true;
                guessInput.className = 'quiz-input correct';
                
                if (activeQuizWordId !== currentCard.bare) {
                    score += 1;
                    document.getElementById('score-val').innerText = score;
                    activeQuizWordId = currentCard.bare; 
                }
                
                // 1. Flip card immediately 
                if(!document.getElementById('card-inner').classList.contains('is-flipped')) {
                    document.getElementById('card-inner').classList.add('is-flipped');
                }
                
                // 2. Play Web Speech target accent context verification aloud
                //playAudio();

                // 3. Automated pacing block execution handler routines
                setTimeout(() => {
                    if (index < words.length - 1) {
                        nextCard();
                    } else {
                        alert("🎉 Amazing work! You finished this deck level sequence.");
                        isTransitioning = false;
                    }
                }, 1500); // 1.5 Second interval pause delay provides optimal feedback evaluation frames
                
            } else {
                guessInput.className = 'quiz-input wrong';
            }
        }

        // Hotkey Binding Integrations
        document.addEventListener('keydown', (e) => {
            if(document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') {
                return; 
            }
            if (e.code === 'Space') { e.preventDefault(); flipCard(); }
            if (e.code === 'ArrowRight') nextCard();
            if (e.code === 'ArrowLeft') prevCard();
            if (e.code === 'KeyV') playAudio(); 
        });

        window.speechSynthesis.getVoices(); 
        initGlobalApp();
    </script>
</body>
</html>
