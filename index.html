<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flash cards</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --success: #27ae60; --bg: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* Stats Header */
        .stats { margin-bottom: 15px; font-size: 1.1rem; color: var(--primary); font-weight: 600; }

        /* Card Setup */
        .card-container { perspective: 1000px; width: 380px; height: 280px; cursor: pointer; }
        .card { position: relative; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .card.is-flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; box-sizing: border-box; background: white; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border: 1px solid #dcdde1; }
        .card-back { transform: rotateY(180deg); background: #f9f9f9; }
        
        /* Text Styles */
        .russian-text { font-size: 2.8rem; font-weight: bold; color: var(--primary); margin: 0; }
        .accented { color: var(--accent); }
        .english-text { font-size: 1.5rem; color: #7f8c8d; text-align: center; margin-top: 10px; }

        /* Buttons */
        .controls { display: flex; gap: 12px; margin-top: 25px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 24px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-size: 1rem; transition: 0.2s; font-weight: 600; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-audio { background: var(--success); display: block; margin-top: 20px; }
        
        #error-msg { color: var(--accent); font-weight: bold; margin-top: 50px; text-align: center; display: none; }
    </style>
</head>
<body>

    <div class="stats">Card <span id="current-idx">0</span> of <span id="total-cards">0</span></div>

    <div id="error-msg"></div>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card-inner">
            <div class="card-face">
                <div class="russian-text" id="front-word">...</div>
                <div style="margin-top: 20px; color: #bdc3c7; font-size: 0.9rem;">Click to reveal</div>
            </div>
            <div class="card-face card-back">
                <div class="russian-text accented" id="back-word">...</div>
                <div class="english-text" id="translation">...</div>
                <button class="btn-audio" onclick="playAudio(event)">🔊 Listen</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard()">← Back</button>
        <button onclick="nextCard()">Next →</button>
        <button onclick="shuffleCards()" style="background: #9b59b6;">Shuffle Deck</button>
    </div>

    <script>
        // Set this to your Python-generated filename
        const DATA_FILE = 'a1_combined.json';
        const AUDIO_PATH = 'audio_files/'; // The folder your Python script created

        let words = [];
        let index = 0;

        async function init() {
            try {
                const response = await fetch(DATA_FILE);
                if (!response.ok) throw new Error("Could not find " + DATA_FILE);
                const data = await response.json();
                words = data.result.entries;
                
                document.getElementById('total-cards').innerText = words.length;
                render();
            } catch (err) {
                const errDiv = document.getElementById('error-msg');
                errDiv.style.display = 'block';
                errDiv.innerHTML = `Error: ${err.message}<br><small>Make sure you are running a local server (Live Server in VS Code).</small>`;
            }
        }

        function render() {
            if (words.length === 0) return;
            const current = words[index];
            
            document.getElementById('current-idx').innerText = index + 1;
            document.getElementById('front-word').innerText = current.bare;
            document.getElementById('back-word').innerText = current.accented;
            document.getElementById('translation').innerText = current.majorTranslations.join(', ');
            
            document.getElementById('card-inner').classList.remove('is-flipped');
        }

        function flipCard() {
            document.getElementById('card-inner').classList.toggle('is-flipped');
        }

        function nextCard() {
            if (index < words.length - 1) {
                index++;
                render();
            }
        }

        function prevCard() {
            if (index > 0) {
                index--;
                render();
            }
        }

        function shuffleCards() {
            words.sort(() => Math.random() - 0.5);
            index = 0;
            render();
        }

        function playAudio(event) {
            event.stopPropagation(); // Prevents flipping the card when clicking audio
            const bare = words[index].bare;
            // Matches the naming convention of your Python audio scraper
            const audio = new Audio(`${AUDIO_PATH}${bare}.mp3`);
            audio.play().catch(e => {
                console.error("Audio missing for:", bare);
                alert("Audio file not found in /audio_files folder.");
            });
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') flipCard();
            if (e.code === 'ArrowRight') nextCard();
            if (e.code === 'ArrowLeft') prevCard();
        });

        init();
    </script>
</body>
</html>
